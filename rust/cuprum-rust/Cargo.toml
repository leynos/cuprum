[package]
name = "cuprum-rust"
version = "0.1.0"
edition = "2024"
license = "ISC"
description = "Optional Rust extension for cuprum stream operations"
publish = false

[lib]
name = "_rust_backend_native"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.28.3", features = ["extension-module"] }

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"

[dev-dependencies]
pyo3 = { version = "0.28.3", features = ["extension-module"] }
trybuild = { version = "1", features = ["diff"] }

[lints]
workspace = true
