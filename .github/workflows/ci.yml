name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      MBAKE_VERSION: '1.4.6'
      TY_VERSION: '0.0.8'
      WHITAKER_INSTALLER_VERSION: '0.2.7'
    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Install CLI tools
        run: |
          uv tool install "mbake==${MBAKE_VERSION}"
          uv tool install "ty==${TY_VERSION}"
          npm install -g markdownlint-cli2

      - name: Install Rust toolchain
        uses: leynos/shared-actions/.github/actions/setup-rust@074f7d8ba75a6e5d18532b72cbe38fccbda4e9c6
        with:
          toolchain: '1.85.0'

      - name: Cache Whitaker installation
        id: cache-whitaker
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.local/bin/whitaker
            ~/.dylint_drivers
            ~/.local/share/whitaker
          key: whitaker-v5-${{ runner.os }}-${{ env.WHITAKER_INSTALLER_VERSION }}

      - name: Install Whitaker
        run: |
          if [ "${{ steps.cache-whitaker.outputs.cache-hit }}" != "true" ]; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked \
                --git https://github.com/leynos/whitaker \
                --version "${WHITAKER_INSTALLER_VERSION}" \
                whitaker-installer
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer \
                --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer --cranelift

      - name: Validate Makefile
        run: mbake validate Makefile

      - name: Install code
        run: make build

      - name: Check formatting
        run: make check-fmt

      - name: Run lint
        run: make lint

  typecheck-test:
    name: Typecheck and test (Python ${{ matrix.python-label }})
    continue-on-error: ${{ matrix.experimental }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.12'
            python-label: '3.12'
            allow-prereleases: false
            experimental: false
          - python-version: '3.13'
            python-label: '3.13'
            allow-prereleases: false
            experimental: false
          - python-version: '3.14'
            python-label: '3.14'
            allow-prereleases: false
            experimental: false
          - python-version: '3.15'
            python-label: '3.15a'
            allow-prereleases: true
            experimental: true
    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.allow-prereleases }}

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.85.0 \
            --profile minimal \
            --component rustfmt \
            --component clippy
          rustup default 1.85.0

      - name: Run typechecker
        run: make typecheck

      - name: Run tests
        run: make test

  coverage:
    # Pull requests only. Pushes to main are handled by coverage-main.yml,
    # which also uploads the report to CodeScene; guarding here stops
    # coverage being generated twice on main.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - lint-test
      - typecheck-test
    env:
      CARGO_HTTP_MULTIPLEXING: 'false'
      CARGO_NET_RETRY: '5'
    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          # Full history so a future CodeScene changed-line gate
          # (cs-coverage check) can reach the pull request merge base.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Install Rust toolchain
        uses: leynos/shared-actions/.github/actions/setup-rust@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          toolchain: '1.92.0'

      - name: Cache Cargo registry and git data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-coverage-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            cargo-coverage-${{ runner.os }}-

      - name: Prepare Cargo dependencies
        run: cargo fetch --locked --manifest-path rust/cuprum-rust/Cargo.toml

      - name: Install code
        run: make build

      # Python-only coverage via the shared action. cuprum's repository
      # root has no Cargo.toml (the Rust workspace lives under rust/), so
      # detect.py classifies it as a Python project; cobertura is
      # mandatory for non-Rust projects. pytest runs serially
      # (pytest-workers: '') because the suite builds and shells out to
      # the Rust toolchain, and the ratchet fails the run if line
      # coverage drops materially below the baseline that coverage-main.yml
      # stores. The pinned action persists a fresh baseline per main run and
      # treats changes within one percentage point as measurement noise.
      #
      - name: Generate coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@4977418856133491c6aa7407d40668744df21818
        with:
          format: cobertura
          output-path: coverage.xml
          pytest-workers: ''
          with-ratchet: 'true'

      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          format: cobertura
          mode: check
          project-url: https://api.codescene.io/v2/projects/74471
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}

  benchmark-ratchet:
    runs-on: ubicloud-standard-4-ubuntu-2404
    needs:
      - lint-test
      - typecheck-test
    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Install hyperfine
        run: |
          sudo apt-get update
          sudo apt-get install --yes hyperfine

      - name: Fetch latest main benchmark baseline
        id: baseline-artifact
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP}/benchmark-ratchet"
          baseline_dir="${artifact_dir}/main-baseline"
          mkdir -p "${artifact_dir}"

          if UV_CACHE_DIR=.uv-cache UV_TOOL_DIR=.uv-tools uv run python \
            benchmarks/fetch_main_benchmark_baseline.py \
            --repository "${GITHUB_REPOSITORY}" \
            --workflow "ci.yml" \
            --artifact-name "benchmark-ratchet-main-baseline" \
            --output-dir "${baseline_dir}"
          then
            echo "baseline_available=true" >> "${GITHUB_OUTPUT}"
          else
            status=$?
            if [[ "${status}" -eq 3 ]]; then
              echo "baseline_available=false" >> "${GITHUB_OUTPUT}"
              echo "No previous successful main benchmark baseline artifact is available."
            else
              exit "${status}"
            fi
          fi

      - name: Run throughput benchmarks and ratchet comparison
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP}/benchmark-ratchet"
          mkdir -p "${artifact_dir}"

          run_smoke_benchmarks() {
            local workspace="$1"
            local prefix="$2"
            pushd "${workspace}" >/dev/null

            make build
            UV_CACHE_DIR=.uv-cache UV_TOOL_DIR=.uv-tools uv run python \
              -m ensurepip --upgrade
            UV_CACHE_DIR=.uv-cache UV_TOOL_DIR=.uv-tools uv run maturin develop \
              --release \
              --manifest-path rust/cuprum-rust/Cargo.toml

            UV_CACHE_DIR=.uv-cache UV_TOOL_DIR=.uv-tools uv run python \
              benchmarks/pipeline_throughput.py \
              --smoke \
              --dry-run \
              --output "${artifact_dir}/${prefix}-full-plan.json"

            UV_CACHE_DIR=.uv-cache UV_TOOL_DIR=.uv-tools uv run python \
              benchmarks/ci_benchmark_ratchet_profile.py \
              --full-plan "${artifact_dir}/${prefix}-full-plan.json" \
              --filtered-plan "${artifact_dir}/${prefix}-plan.json" \
              --throughput "${artifact_dir}/${prefix}-throughput.json"

            popd >/dev/null
          }

          run_smoke_benchmarks "${GITHUB_WORKSPACE}" "candidate"

          if [[ "${{ steps.baseline-artifact.outputs.baseline_available }}" == "true" ]]; then
            pushd "${GITHUB_WORKSPACE}" >/dev/null
            UV_CACHE_DIR=.uv-cache UV_TOOL_DIR=.uv-tools uv run python \
              benchmarks/ratchet_rust_performance.py \
              --baseline-plan "${artifact_dir}/main-baseline/main-plan.json" \
              --baseline-throughput "${artifact_dir}/main-baseline/main-throughput.json" \
              --candidate-plan "${artifact_dir}/candidate-plan.json" \
              --candidate-throughput "${artifact_dir}/candidate-throughput.json" \
              --max-regression 0.30 \
              --output "${artifact_dir}/ratchet-report.json"
            popd >/dev/null
          else
            REPORT_PATH="${artifact_dir}/ratchet-report.json" \
            UV_CACHE_DIR=.uv-cache UV_TOOL_DIR=.uv-tools uv run python - <<'PY'
          import json
          import os
          import pathlib as pth

          report_path = pth.Path(os.environ["REPORT_PATH"])
          report_path.write_text(
              json.dumps(
                  {
                      "baseline_available": False,
                      "comparison_performed": False,
                      "passed": True,
                      "reason": "no_previous_main_benchmark_baseline",
                  },
                  indent=2,
                  sort_keys=True,
              ),
              encoding="utf-8",
          )
          PY
          fi

          cp "${artifact_dir}/candidate-plan.json" "${artifact_dir}/main-plan.json"
          cp "${artifact_dir}/candidate-throughput.json" "${artifact_dir}/main-throughput.json"

      - name: Generate benchmark comparison report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP}/benchmark-ratchet"

          # Only generate report if all required input files exist
          if [[ -f "${artifact_dir}/candidate-plan.json" ]] && \
             [[ -f "${artifact_dir}/candidate-throughput.json" ]] && \
             [[ -f "${artifact_dir}/ratchet-report.json" ]]; then
            UV_CACHE_DIR=.uv-cache UV_TOOL_DIR=.uv-tools uv run python \
              benchmarks/python_vs_rust_comparison_report.py \
              --plan "${artifact_dir}/candidate-plan.json" \
              --throughput "${artifact_dir}/candidate-throughput.json" \
              --ratchet-report "${artifact_dir}/ratchet-report.json" \
              --output-json "${artifact_dir}/comparison-report.json" \
              --output-markdown "${artifact_dir}/comparison-summary.md"
          else
            echo "Skipping comparison report generation: required input files not found"
            echo "This usually indicates the benchmark run failed before completing"
          fi

      - name: Publish benchmark workflow summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP}/benchmark-ratchet"
          if [[ -f "${artifact_dir}/comparison-summary.md" ]]; then
            cat "${artifact_dir}/comparison-summary.md" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload benchmark ratchet artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-ratchet
          path: |
            ${{ runner.temp }}/benchmark-ratchet/**/*.json
            ${{ runner.temp }}/benchmark-ratchet/**/*.md

      - name: Upload main benchmark baseline artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-ratchet-main-baseline
          path: |
            ${{ runner.temp }}/benchmark-ratchet/main-plan.json
            ${{ runner.temp }}/benchmark-ratchet/main-throughput.json

  build-wheels:
    uses: ./.github/workflows/build-wheels.yml
    with:
      python-version: '3.13'
